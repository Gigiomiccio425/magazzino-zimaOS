# ============================================================
# INSTALLAZIONE — App Store grafico ZimaOS (pull immagine da GHCR).
# La UI di ZimaOS scarica solo immagini gia pronte: NON builda.
# L'immagine viene pubblicata da GitHub Actions su GHCR (GitHub stesso).
#
# Prerequisito una tantum (vedi README):
#   1. Repo contiene .github/workflows/docker-publish.yml
#   2. Actions ha buildato -> immagine su ghcr.io
#   3. Package GHCR impostato "Public"
#
# Poi: incolla questo YAML in App Store -> Import, cambia APP_PASSWORD, avvia.
# ============================================================
services:
  magazzino:
    image: ghcr.io/gigiomiccio425/magazzino-zimaos:latest
    container_name: magazzino
    pull_policy: always
    ports:
      # host:container -> apri http://IP-ZIMA:8086
      - "8086:8000"
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-cambiami}   # CAMBIALA
      - APP_NAME=${APP_NAME:-MAGAZZINO}
      - SECRET_KEY=${SECRET_KEY:-}
      - TZ=${TZ:-Europe/Rome}
      - DATA_DIR=/data
    volumes:
      # bind mount su path host ZimaOS (persistenza dati)
      - /DATA/AppData/magazzino:/data
    restart: unless-stopped
