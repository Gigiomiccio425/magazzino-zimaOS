# ============================================================
# INSTALLAZIONE — App Store grafico ZimaOS (pull immagine da GHCR).
# Aggiornamenti CONTROLLATI per versione: nessun auto-update.
#
# La versione e' FISSATA qui sotto (:1.1.0). Il container resta su questa
# versione finche' non la cambi TU.
#
# Per aggiornare a una nuova versione:
#   1. Guarda le Release del repo: github.com/Gigiomiccio425/magazzino-zimaOS/releases
#   2. Cambia il numero dopo i due punti (es. :1.1.0 -> :1.2.0)
#   3. Ricrea il container (App Store: Recreate / CLI: docker compose up -d)
#
# Prerequisito: immagine pubblicata su GHCR e package "Public" (una volta sola).
# ============================================================
services:
  magazzino:
    image: ghcr.io/gigiomiccio425/magazzino-zimaos:1.1.0
    container_name: magazzino
    pull_policy: always
    ports:
      # host:container -> apri http://IP-ZIMA:8086
      - "8086:8000"
    environment:
      - APP_PASSWORD=${APP_PASSWORD:-cambiami}   # CAMBIALA
      - APP_NAME=${APP_NAME:-MAGAZZINO}
      - SECRET_KEY=${SECRET_KEY:-}
      - TZ=${TZ:-Europe/Rome}
      - DATA_DIR=/data
    volumes:
      # bind mount su path host ZimaOS (persistenza dati)
      - /DATA/AppData/magazzino:/data
    restart: unless-stopped
